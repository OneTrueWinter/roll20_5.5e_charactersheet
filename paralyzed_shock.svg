<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64"
     width="64"
     height="64"
     role="img"
     aria-labelledby="title">
  <title id="title">Electric shock icon</title>

  <!-- Transparent background. Optimised for very small display sizes. -->

  <!-- Conventional lightning-bolt silhouette with a heavier upper section -->
  <path fill="currentColor"
        d="M30 1
           H43
           L36 13
           H44
           L29 28
           L33 17
           H23
           Z"/>

  <!-- Head -->
  <circle fill="currentColor" cx="32" cy="35" r="9"/>

  <!-- Reduced torso, cropped by the lower edge -->
  <path fill="currentColor"
        d="M23 45
           H41
           A3 3 0 0 1 44 48
           V64
           H20
           V48
           A3 3 0 0 1 23 45
           Z"/>

  <!-- Raised arms -->
  <g fill="none"
     stroke="currentColor"
     stroke-width="8"
     stroke-linecap="round"
     stroke-linejoin="round">
    <path d="M23 49 14 42 17 29"/>
    <path d="M41 49 50 42 47 29"/>
  </g>
</svg>
